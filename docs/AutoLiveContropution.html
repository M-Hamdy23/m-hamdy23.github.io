  * { box-sizing: border-box; margin: 0; padding: 0; }

  .header h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: var(--color-background-secondary); }
  .filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 3px; font-weight: 400; }
  .card-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
  .hidden { display: none; }

  .cat-cms .icon { background: #EEF; }
  .cat-timeline .icon { background: #FFF3E0; }
  .cat-ui .icon { background: #E8F5E9; }
  .cat-car .icon { background: #FFEBEE; }
  .cat-tools .icon { background: #F3E5F5; }

  .badge-cms { background: #E8EAF6; color: #3949AB; }

  .badge-ui { background: #E8F5E9; color: #2E7D32; }
  .badge-car { background: #FFEBEE; color: #C62828; }
  .badge-tools { background: #F3E5F5; color: #6A1B9A; }
</style>

function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    if (cat === 'all' || c.dataset.cat === cat) c.classList.remove('hidden');
    else c.classList.add('hidden');
  });
}

const grid = document.getElementById('grid');
items.forEach(item => {
  const card = document.createElement('div');
  card.className = `card cat-${item.cat}`;
  card.dataset.cat = item.cat;
  card.innerHTML = `
    <div class="card-header">
      <div class="icon">${item.icon}</div>
      <div>
        <div class="card-title">${item.title}</div>
        <span class="badge ${item.badgeClass}">${item.badge}</span>
      </div>
    </div>
    <p class="card-desc">${item.desc}</p>
    <div class="tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
  `;
  grid.appendChild(card);
});
